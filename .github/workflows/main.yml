name: List Available RK3399 Boards

on:
  workflow_dispatch:

jobs:
  list-boards:
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Checkout build framework
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: build

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git libncurses5-dev libssl-dev \
            make bison device-tree-compiler flex gcc-arm-none-eabi mtools python3 \
            python3-pyelftools u-boot-tools qemu-user-static

      - name: List all boards
        working-directory: ./build
        run: |
          echo "=== 所有可用的 RK3399 相关板卡 ==="
          ./compile.sh list-boards 2>/dev/null | grep -i rk3399 || echo "未找到包含 rk3399 的板卡"
          echo ""
          echo "=== 所有 rockchip64 家族的板卡 ==="
          ./compile.sh list-boards 2>/dev/null | grep -i rockchip64 || echo "未找到 rockchip64 板卡"
